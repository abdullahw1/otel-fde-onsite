# metrics-server-application.yaml -- deploys metrics-server via Argo CD.
# metrics-server collects live CPU/memory usage from each node/pod. It is REQUIRED
# for the HPA to work: without it the autoscaler has no CPU readings and can't scale.
# EKS does not ship it by default, so we add it ourselves.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/metrics-server/
    chart: metrics-server
    targetRevision: 3.12.1
    helm:
      releaseName: metrics-server
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system     # lives alongside other core cluster components
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
