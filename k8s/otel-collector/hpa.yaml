# hpa.yaml -- HorizontalPodAutoscaler: adds/removes collector pods automatically.
# It watches CPU usage (reported by metrics-server) and changes the Deployment's
# replica count to keep average CPU near the target. This is what we expect to see
# "kick in" during load testing and is a core part of the scaling story.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
spec:
  # Which workload to scale.
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: otel-collector
  minReplicas: 2   # never go below 2 (HA)
  maxReplicas: 8   # cap so we don't overwhelm the 2-node cluster
  # Target: keep average CPU at 70% of each pod's request. Above that -> scale up.
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  # Tuning to react fast to spikes but scale down slowly (avoid flapping).
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # react within ~30s when load rises
      policies:
        - type: Percent
          value: 100                   # allowed to double pods per minute
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # wait 5 min of calm before shrinking
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
