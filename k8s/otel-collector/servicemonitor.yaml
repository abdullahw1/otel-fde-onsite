apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - otel
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
