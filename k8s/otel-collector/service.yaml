# service.yaml -- the INTERNAL (cluster-only) address for the collector.
# A Service gives a stable name + IP that load-balances across the collector pods
# (which come and go as the HPA scales). type: ClusterIP means it is reachable only
# from inside the cluster. This is what Prometheus uses to scrape the :8888 metrics,
# and what other in-cluster apps would use to send telemetry.
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
spec:
  type: ClusterIP
  # Route to any pod carrying this label (the collector pods from the Deployment).
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: metrics
      port: 8888
      targetPort: metrics
    - name: health
      port: 13133
      targetPort: health
