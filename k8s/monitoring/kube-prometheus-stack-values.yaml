# kube-prometheus-stack-values.yaml -- standalone reference copy of the Helm values.
# NOTE: this file is NOT what's actually deployed. Argo CD applies the SAME values
# inlined under `valuesObject` in argocd/monitoring-application.yaml. Keep this as a
# readable reference / `helm install -f` fallback, or delete it to avoid duplication.
prometheus:
  prometheusSpec:
    retention: 6h
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 300m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi

grafana:
  adminPassword: admin
  service:
    type: ClusterIP
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
